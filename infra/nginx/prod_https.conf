upstream fastapi {
    server fastapi:8000;
}

# http
server {
    listen 80 default_server;
    server_name 15.165.80.166 _;

    return 301 https://all4health.kro.kr$request_uri;
}

server {
    listen 80;
    server_name all4health.kro.kr;

    # 추후 certbot ssl 인증서 갱신 시 필요
    location /.well-known/acme-challenge/ {
       root /var/www/certbot;
    }

    location /api/ {
        return 301 https://all4health.kro.kr$request_uri;
    }

    location / {
        return 301 https://all4health.kro.kr$request_uri;
    }
}

# https
server {
    listen 443 ssl default_server;
    server_name 15.165.80.166 _;

    ssl_certificate /etc/letsencrypt/live/all4health.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/all4health.kro.kr/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://all4health.kro.kr$request_uri;
}

server {
    server_name all4health.kro.kr;

    listen 443 ssl;

    ssl_certificate /etc/letsencrypt/live/all4health.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/all4health.kro.kr/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    location / {
        root /vol/web/frontend;
        try_files $uri $uri/ /index.html;
    }
}
